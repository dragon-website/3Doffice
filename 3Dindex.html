<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">
<title>Dragon Development Engineering Co., Ltd. | Office Interior</title>
<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}
html,body{

width:100%;
height:100%;

background:#f6f1e9;

font-family:
Arial,
Helvetica,
sans-serif;
overflow:hidden;
}

/* Viewer */
#viewer{

width:100vw;
height:100vh;

background:
radial-gradient(circle at center,
#3f4349 0%,
#24272d 35%,
#111417 70%,
#050608 100%);
}

/* Logo */

.logo{
position:absolute;
left:30px;
top:28px;
z-index:100;
color:white;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
}
.logo small{
display:block;
font-size:12px;
opacity:.6;
font-weight:400;
margin-top:4px;
}
/* Bottom */
.bottom{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
padding:12px 20px;
border-radius:40px;
font-size:14px;
color:#ddd;
z-index:100;
}

/* Loading */

#loading{
position:absolute;
inset:0;
background:#f6f1e9;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
transition:.6s;
}

.bar{
width:280px;
height:8px;
background:#d4e0ec;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.fill{
height:100%;
width:0;
background:#5d6d59;
transition:.1s;

}

#percent{

margin-top:15px;
font-size:24px;
font-weight:bold;
color:#5d6d59;

}
</style>
</head>
<body>
<div id="loading">
<h2 style="color:#5d6d59;">
Dragon Development Engineering Co. Ltd.
</h2>
<div class="bar">
<div
class="fill"
id="fill">
</div>
</div>
<div id="percent">
0%
</div>
</div>
<div class="logo">
Dragon Development Engineering Co. Ltd.
<small>
Interactive 3D Viewer
</small>
</div>
<model-viewer
  id="viewer"
  src="https://genz-3d.com/Office2.glb"
  alt="Office2"
  camera-controls
  auto-rotate
  environment-image="neutral"
  shadow-intensity="1"
  exposure="1"
  ar
  camera-orbit="45deg 65deg auto"
  field-of-view="30deg">
</model-viewer>
<div class="bottom">

🖱 拖曳旋轉　|　滾輪縮放　|　右鍵平移

</div>
<script>
const viewer=document.querySelector("#viewer");
const fill=document.querySelector("#fill");
const text=document.querySelector("#percent");
const loading=document.querySelector("#loading");
let p=0;
const timer=setInterval(()=>{

if(p<90){
p++;
fill.style.width=p+"%";
text.innerHTML=p+"%";
}
},18);
viewer.addEventListener("load",()=>{
clearInterval(timer);
fill.style.width="100%";
text.innerHTML="100%";
setTimeout(()=>{
loading.style.opacity="0";
setTimeout(()=>{
loading.remove();
},600);
},300);
});
viewer.addEventListener("error",(e)=>{
console.error(e);
alert("模型載入失敗");
});
</script>
</body>
</html>
